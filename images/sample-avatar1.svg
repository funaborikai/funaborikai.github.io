<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0e0"/><stop offset="1" stop-color="#ffe0c9"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="url(#bg1)"/>
  <!-- shoulders / shirt -->
  <path d="M16 100 C18 78 32 70 50 70 C68 70 82 78 84 100 Z" fill="#5fb6bd"/>
  <path d="M50 70 l-7 12 l7 6 l7 -6 Z" fill="#eaf6f6"/>
  <!-- neck -->
  <rect x="44" y="58" width="12" height="14" rx="5" fill="#f3c39e"/>
  <!-- face -->
  <circle cx="50" cy="44" r="23" fill="#f8d2ab"/>
  <!-- ears -->
  <circle cx="27" cy="45" r="4.5" fill="#f3c39e"/><circle cx="73" cy="45" r="4.5" fill="#f3c39e"/>
  <!-- hair -->
  <path d="M27 44 C25 25 38 18 50 18 C62 18 75 25 73 44 C71 36 64 33 64 33 C60 28 40 28 36 33 C36 33 29 36 27 44 Z" fill="#5b4636"/>
  <!-- glasses -->
  <g fill="none" stroke="#6b5a4a" stroke-width="1.6">
    <circle cx="41" cy="45" r="6.5"/><circle cx="59" cy="45" r="6.5"/><path d="M47.5 45 h5"/>
  </g>
  <!-- eyes -->
  <circle cx="41" cy="45.5" r="2.4" fill="#3a2c22"/><circle cx="59" cy="45.5" r="2.4" fill="#3a2c22"/>
  <!-- eyebrows -->
  <path d="M35 37 q6 -2 11 0" stroke="#5b4636" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M54 37 q5 -2 11 0" stroke="#5b4636" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- blush -->
  <circle cx="36" cy="53" r="4" fill="#f7a79c" opacity=".55"/><circle cx="64" cy="53" r="4" fill="#f7a79c" opacity=".55"/>
  <!-- smile -->
  <path d="M43 54 q7 7 14 0" stroke="#bf6f57" stroke-width="2.2" fill="none" stroke-linecap="round"/>
</svg>
